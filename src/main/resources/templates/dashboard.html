<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Personal Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: alerts}"></div>

<main class="container py-4">
    <div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-md-center mb-4">
        <div>
            <h1 class="h3 mb-1">Dashboard</h1>
            <p class="text-muted mb-0">Welcome, <span th:text="${fullName} ?: 'Student'">Student</span></p>
        </div>
        <a th:href="@{/expenses/add}" class="btn btn-primary">Add Expense</a>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card summary-card border-0 shadow-sm">
                <div class="card-body">
                    <p class="text-muted mb-1">Total Expenses</p>
                    <h2 class="h3 mb-0">₹<span th:text="${totalExpenses}">0.00</span></h2>
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h2 class="h5 mb-3">Category Summary</h2>
                    <div class="row g-2">
                        <div class="col-6 col-md-4" th:each="entry : ${categorySummary}">
                            <div class="category-box">
                                <span th:text="${entry.key.displayName}">Food</span>
                                <strong>₹<span th:text="${entry.value}">0.00</span></strong>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="h5 mb-0">Recent Expenses</h2>
                <a th:href="@{/expenses}" class="btn btn-outline-primary btn-sm">View All</a>
            </div>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th class="text-end">Amount</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="expense : ${recentExpenses}">
                        <td th:text="${expense.title}">Lunch</td>
                        <td><span class="badge text-bg-light" th:text="${expense.category.displayName}">Food</span></td>
                        <td th:text="${expense.date}">2026-06-10</td>
                        <td class="text-end fw-semibold">₹<span th:text="${expense.amount}">0.00</span></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(recentExpenses)}">
                        <td colspan="4" class="text-center text-muted py-4">No expenses added yet.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
