<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses | Personal Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: alerts}"></div>

<main class="container py-4">
    <div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-md-center mb-4">
        <div>
            <h1 class="h3 mb-1">Expenses</h1>
            <p class="text-muted mb-0">View, search, edit, and delete expenses.</p>
        </div>
        <a th:href="@{/expenses/add}" class="btn btn-primary">Add Expense</a>
    </div>

    <form th:action="@{/expenses}" method="get" class="row g-2 mb-4">
        <div class="col-md-10">
            <input type="search" class="form-control" name="keyword" th:value="${keyword}" placeholder="Search by title, category, date, amount, or description">
        </div>
        <div class="col-md-2 d-grid">
            <button class="btn btn-outline-primary" type="submit">Search</button>
        </div>
    </form>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Description</th>
                        <th class="text-end">Amount</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="expense : ${expenses}">
                        <td th:text="${expense.id}">1</td>
                        <td class="fw-semibold" th:text="${expense.title}">Lunch</td>
                        <td><span class="badge text-bg-light" th:text="${expense.category.displayName}">Food</span></td>
                        <td th:text="${expense.date}">2026-06-10</td>
                        <td th:text="${expense.description}">College canteen</td>
                        <td class="text-end">₹<span th:text="${expense.amount}">0.00</span></td>
                        <td class="text-end">
                            <div class="d-inline-flex gap-2">
                                <a class="btn btn-sm btn-outline-secondary" th:href="@{/expenses/edit/{id}(id=${expense.id})}">Edit</a>
                                <form th:action="@{/expenses/delete/{id}(id=${expense.id})}" method="post" class="delete-form">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(expenses)}">
                        <td colspan="7" class="text-center text-muted py-4">No expenses found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
