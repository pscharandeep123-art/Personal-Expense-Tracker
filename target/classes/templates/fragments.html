<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/dashboard}">Expense Tracker</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/expenses}">Expenses</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/expenses/add}">Add Expense</a></li>
            </ul>
            <a class="btn btn-light btn-sm" th:href="@{/logout}">Logout</a>
        </div>
    </div>
</nav>

<div th:fragment="alerts" class="container mt-3">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<footer th:fragment="footer" class="py-4 mt-5 border-top bg-white">
    <div class="container text-center text-muted small">
        Personal Expense Tracker using Spring Boot, Thymeleaf, Bootstrap, and JSON File Storage.
    </div>
</footer>
</body>
</html>
